<text x="1081" y="61" text-anchor="middle" class="label">Derived result</text>
<rect x="695" y="116" width="216" height="48" rx="10" class="cat-cloud"/>
<text x="803" y="145" text-anchor="middle" class="label">context-mode sandbox</text>
